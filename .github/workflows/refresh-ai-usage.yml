name: Refresh AI Usage Snapshot

on:
  schedule:
    - cron: '0 17 * * *' # 17:00 UTC = 00:00 WIB
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Tokscale snapshot
        run: node scripts/fetch-ai-usage.mjs

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ai-usage.json
          git diff --cached --quiet || git commit -m "chore(ai-usage): refresh tokscale snapshot [skip ci]"
          git push
